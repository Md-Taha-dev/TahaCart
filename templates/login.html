
   {% extends 'base_auth.html' %}

 {% block css %}
     <link rel="stylesheet" href="{{url_for('static',filename='css/login.css')}}">

   
    {% endblock %}

   {% block content %}

         <div class="login-form">
            <p>Log in</p>
            <form method="post">
                {{form.hidden_tag()}}
                    
                    {{form.username.label()}}
                    {{form.username()}}

                    {{form.password.label()}}
                    {{form.password()}}

            
                   <button type="submit" class="btn-login-form">
        Log in
    </button>

            </form>
           
            <p id="createaccount">Do not have an Account?</p>
            <a href="{{url_for('signup_page')}}" class="btn-login-form"> 
                Sign Up
            </a>
           
        </div>
 {% endblock %}
