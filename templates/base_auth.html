<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="{{url_for('static',filename='css/auth.css')}}">

    {% block css %}
    
    {% endblock %}
    <meta name="google-site-verification" content="veAlUqOMOvrWNiosfx6aAal5iINkToXFw150paV8i0E" />
    <link rel="icon" href="{{ url_for('static', filename='images/TahaCartLogo.png') }}">
    
    <title>TahaCart</title>
</head>
<body>

<div class="page-wrapper">

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
  {% for category, message in messages %}

    <div class="flash-message flash-{{ category }}">
      <span>{{ message }}</span>

      <button type="button" class="flash-close"
        onclick="this.parentElement.style.display='none'">
        &times;
      </button>
    </div>

  {% endfor %}
{% endif %}
{% endwith %}

{% block content %}
{% endblock %}

</div>

</body>
</html>
